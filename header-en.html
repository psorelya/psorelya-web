<script>
(function trySetLang() {
    var map = {
        'index.html': '../index.html',
        'our-story.html': '../notre-histoire.html',
        'article-vitamin-d3.html': '../article-vitamine-d3.html',
        'legal.html': '../mentions-legales.html'
    };
    var page = window.location.pathname.split('/').pop();
    if (!page) page = 'index.html';
    var frPage = map[page] || '../index.html';
    var link = document.getElementById('lang-fr-link');
    if (link) { link.href = frPage; }
    else { setTimeout(trySetLang, 50); }
})();
window.setLangLink = function() {
    var map = {
        'index.html': '../index.html',
        'our-story.html': '../notre-histoire.html',
        'article-vitamin-d3.html': '../article-vitamine-d3.html',
        'legal.html': '../mentions-legales.html'
    };
    var page = window.location.pathname.split('/').pop();
    if (!page) page = 'index.html';
    var frPage = map[page] || '../index.html';
    var link = document.getElementById('lang-fr-link');
    if (link) link.href = frPage;
};

function toggleMenu() {
    document.getElementById('mon-menu').classList.toggle('show');
}

// Fermer en cliquant ailleurs
document.addEventListener('click', function(e) {
    var menu = document.getElementById('mon-menu');
    var btn = document.getElementById('menu-btn');
    if (menu && btn && !menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.remove('show');
    }
});

// Fermer au scroll
window.addEventListener('scroll', function() {
    var menu = document.getElementById('mon-menu');
    if (menu) menu.classList.remove('show');
}, { passive: true });
</script>
