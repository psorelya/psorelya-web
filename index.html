<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psorelya | L'Essence du Bien-être</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500;600&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --brume: #DEE1EA;
            --or: #C5A47E; /* Un or plus profond pour la lisibilité */
            --texte: #2D2D2D; /* Gris anthracite pour le contraste */
            --font-titre: 'Cormorant Garamond', serif;
        }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Montserrat', sans-serif; background-color: var(--brume); color: var(--texte); }
        
        /* Fond avec un léger dégradé pour plus de profondeur */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle, rgba(222,225,234,1) 0%, rgba(200,205,220,1) 100%);
            text-align: center;
            padding: 0 20px;
        }

        .logo-top { position: absolute; top: 40px; right: 40px; font-family: var(--font-titre); letter-spacing: 6px; color: var(--or); font-size: 1.4rem; font-weight: 500; }
        
        h1 { font-family: var(--font-titre); font-size: clamp(2.5rem, 8vw, 4.5rem); font-weight: 300; margin-bottom: 10px; letter-spacing: 2px; line-height: 1.1; }
        .subtitle { font-family: var(--font-titre); font-style: italic; font-size: 1.5rem; color: #555; margin-bottom: 40px; }
        
        .line { width: 80px; height: 1px; background: var(--or); margin-bottom: 30px; }

        .btn-or {
            padding: 15px 45px;
            border: 1.5px solid var(--or);
            background: transparent;
            color: var(--texte);
            font-family: 'Montserrat', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
        }
        .btn-or:hover { background: var(--or); color: white; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(197, 164, 126, 0.2); }

        .nav-trigger { position: absolute; top: 40px; left: 40px; cursor: pointer; }
        .nav-trigger div { width: 30px; height: 1px; background: var(--or); margin: 8px 0; }
    </style>
</head>
<body>
    <div class="nav-trigger"><div></div><div></div></div>
    <div class="logo-top">PSORELYA</div>
    
    <section class="hero">
        <div class="line"></div>
        <h1>L'Essence de Psorelya</h1>
        <p class="subtitle">Une parenthèse de douceur dans un écrin de brume et d'or.</p>
        <button class="btn-or">Découvrir l'univers</button>
    </section>
</body>
</html>
