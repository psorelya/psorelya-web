<!-- BANNIÈRE COOKIES -->
<div class="cookie-banner" id="cookieBanner">
    <div class="cookie-banner-inner">
        <p>Nous utilisons des cookies pour analyser notre trafic et améliorer votre expérience. Consultez notre <a href="mentions-legales.html#confidentialite">politique de confidentialité</a>.</p>
        <div class="cookie-buttons">
            <button class="cookie-btn cookie-btn-refuse" onclick="refuseCookies()">Refuser</button>
            <button class="cookie-btn cookie-btn-accept" onclick="acceptCookies()">Accepter</button>
        </div>
    </div>
</div>

<script>
function acceptCookies() {
    localStorage.setItem('psorelya_cookies', 'accepted');
    document.getElementById('cookieBanner').style.display = 'none';
    if (typeof loadGoogleAnalytics === 'function') loadGoogleAnalytics();
}
function refuseCookies() {
    localStorage.setItem('psorelya_cookies', 'refused');
    document.getElementById('cookieBanner').style.display = 'none';
}
(function() {
    if (!localStorage.getItem('psorelya_cookies')) {
        document.getElementById('cookieBanner').style.display = 'block';
    }
})();
</script>
